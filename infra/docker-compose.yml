version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: purpleops
      POSTGRES_USER: purpleops
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purpleops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://purpleops:changeme@postgres:5432/purpleops
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+asyncpg://purpleops:changeme@postgres:5432/purpleops
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - backend
      - redis
    volumes:
      - ../backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
